name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CPU-only PyTorch first
        # Install the CPU wheel before the rest of requirements to avoid
        # pulling in the CUDA runtime (~4 GB) in CI.
        run: |
          pip install torch==2.0.0+cpu torchvision==0.15.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install \
            transformers==4.33.2 \
            diffusers==0.21.4 \
            Pillow==10.0.1 \
            pydantic==1.10.13 \
            PyYAML==6.0.1 \
            pandas==2.1.1 \
            numpy==1.24.4 \
            mlflow==2.8.1 \
            boto3==1.28.85 \
            huggingface_hub \
            pytest \
            pytest-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Prevent any accidental network calls to HF Hub in tests
          TRANSFORMERS_OFFLINE: "1"
          HF_DATASETS_OFFLINE: "1"
